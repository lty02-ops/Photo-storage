name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend-test:
    name: Backend Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run backend tests
        working-directory: backend
        run: mvn --batch-mode test

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint AWS configuration
        run: |
          helm lint infra/helm/photo-storage \
            -f infra/helm/photo-storage/values-aws.yaml

      - name: Lint GCP configuration
        run: |
          helm lint infra/helm/photo-storage \
            -f infra/helm/photo-storage/values-gcp.yaml

      - name: Lint local configuration
        run: |
          helm lint infra/helm/photo-storage \
            -f infra/helm/photo-storage/values-local.yaml

  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest

    strategy:
      matrix:
        directory:
          - infra/terraform/aws
          - infra/terraform/gcp
          - infra/terraform/multicloud-network

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Check Terraform formatting
        working-directory: ${{ matrix.directory }}
        run: terraform fmt -check

      - name: Initialize Terraform
        working-directory: ${{ matrix.directory }}
        run: terraform init -backend=false

      - name: Validate Terraform
        working-directory: ${{ matrix.directory }}
        run: terraform validate