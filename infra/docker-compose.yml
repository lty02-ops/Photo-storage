services:
  postgres:
    image: postgres:16
    container_name: photo-storage-postgres
    environment:
      POSTGRES_DB: photo_storage
      POSTGRES_USER: photo_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in infra/.env}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: photo-storage-backend
    environment:
      CLOUD_PROVIDER: local
      STORAGE_REPLICATION_ENABLED: "false"
      STORAGE_REPLICATION_TARGET_PROVIDER: ""
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/photo_storage
      SPRING_DATASOURCE_USERNAME: photo_user
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in infra/.env}
      FRONTEND_URL: http://localhost:3000
    ports:
      - "8081:8080"
    depends_on:
      - postgres
    networks:
      default:
        aliases:
          - photo-storage-backend

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: photo-storage-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend  
  

volumes:
  postgres-data:
